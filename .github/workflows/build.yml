name: Build APK
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
      - name: Setup Android project
        run: |
          flutter create . --project-name dual_camera_app --org com.example
      - name: Write correct dart file
        run: |
          mkdir -p lib/screens
          echo "" | base64 -d > lib/screens/dual_camera_screen.dart
      - name: Update pubspec.yaml
        run: |
          python3 << 'PYEOF'
          import re
          with open('pubspec.yaml', 'r') as f:
              content = f.read()
          content = re.sub(r'  (gal|image_gallery_saver|saver_gallery)[^\n]+\n', '  saver_gallery: ^3.0.6\n', content)
          with open('pubspec.yaml', 'w') as f:
              f.write(content)
          print("pubspec.yaml updated")
          PYEOF
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: dual-camera-app
          path: build/app/outputs/flutter-apk/app-release.apk
