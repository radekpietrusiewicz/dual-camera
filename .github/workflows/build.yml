name: Build APK
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
      - name: Setup Android project
        run: |
          flutter create . --project-name dual_camera_app --org com.example
      - name: Write correct dart file
        run: |
          mkdir -p lib/screens
          echo "" | base64 -d > lib/screens/dual_camera_screen.dart
      - name: Write correct pubspec.yaml
        run: |
          cat > pubspec.yaml << 'PUBEOF'
          name: dual_camera_app
          description: Dual Camera App
          publish_to: 'none'
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            camera: ^0.10.5+9
            path_provider: ^2.1.2
            path: ^1.9.0
            permission_handler: ^11.3.0
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0
          flutter:
            uses-material-design: true
          PUBEOF
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: dual-camera-app
          path: build/app/outputs/flutter-apk/app-release.apk
