name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK 35
        run: |
          yes | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create Flutter project
        run: |
          flutter create dual_camera_app --project-name dual_camera_app --org com.dualcamera
          cd dual_camera_app
          mkdir -p lib/screens

      - name: Write screen file
        run: |
          echo "" | base64 -d > dual_camera_app/lib/screens/dual_camera_screen.dart

      - name: Write main.dart
        run: |
          echo "" | base64 -d > dual_camera_app/lib/main.dart

      - name: Write pubspec.yaml
        run: |
          echo "" | base64 -d > dual_camera_app/pubspec.yaml

      - name: Write AndroidManifest.xml
        run: |
          echo "" | base64 -d > dual_camera_app/android/app/src/main/AndroidManifest.xml

      - name: Write gradle.properties
        run: |
          echo "android.aapt2FromMavenOverride=${ANDROID_SDK_ROOT}/build-tools/35.0.0/aapt2" >> dual_camera_app/android/gradle.properties

      - name: Update compileSdkVersion
        run: |
          sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 35/' dual_camera_app/android/app/build.gradle || true
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 35/' dual_camera_app/android/app/build.gradle || true

      - name: Run flutter pub get
        run: |
          cd dual_camera_app
          flutter pub get

      - name: Build APK
        run: |
          cd dual_camera_app
          flutter build apk --release --no-tree-shake-icons

      - uses: actions/upload-artifact@v4
        with:
          name: dual-camera-app
          path: dual_camera_app/build/app/outputs/flutter-apk/app-release.apk
