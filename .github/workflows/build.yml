name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create Flutter project
        run: flutter create dual_camera_app --platforms android

      - name: Write pubspec.yaml
        run: echo "" | base64 -d > dual_camera_app/pubspec.yaml

      - name: Write main.dart
        run: |
          cat > dual_camera_app/lib/main.dart << 'DARTEOF'
          import 'package:flutter/material.dart';
          import 'screens/dual_camera_screen.dart';
          void main() { runApp(const MyApp()); }
          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'DualCamera',
                debugShowCheckedModeBanner: false,
                theme: ThemeData(colorScheme: ColorScheme.fromSeed(seedColor: Colors.black), useMaterial3: true),
                home: const DualCameraScreen(),
              );
            }
          }
          DARTEOF

      - name: Write dual_camera_screen.dart
        run: |
          mkdir -p dual_camera_app/lib/screens
          echo "" | base64 -d > dual_camera_app/lib/screens/dual_camera_screen.dart

      - name: Write AndroidManifest.xml
        run: echo "" | base64 -d > dual_camera_app/android/app/src/main/AndroidManifest.xml

      - name: Install SDK 34
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" || true

      - name: Write build.gradle
        run: |
          cat > dual_camera_app/android/app/build.gradle << 'GRADLEOF'
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }
          android {
              namespace "com.example.dual_camera_app"
              compileSdk 34
              ndkVersion flutter.ndkVersion
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
              kotlinOptions {
                  jvmTarget = '1.8'
              }
              defaultConfig {
                  applicationId "com.example.dual_camera_app"
                  minSdk 21
                  targetSdk 34
                  versionCode flutter.versionCode
                  versionName flutter.versionName
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                  }
              }
          }
          flutter {
              source '../..'
          }
          GRADLEOF

      - name: Flutter pub get
        working-directory: dual_camera_app
        run: flutter pub get

      - name: Build APK
        working-directory: dual_camera_app
        run: flutter build apk --debug --no-tree-shake-icons

      - uses: actions/upload-artifact@v4
        with:
          name: dual-camera-app
          path: dual_camera_app/build/app/outputs/flutter-apk/app-debug.apk
