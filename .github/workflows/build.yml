name: Build APK
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.5
      - name: Create Flutter project
        run: flutter create . --project-name dual_camera_app --org com.example
      - name: Write screen file
        run: |
          mkdir -p lib/screens
          echo "" | base64 -d > lib/screens/dual_camera_screen.dart
      - name: Write main.dart
        run: |
          
          echo "$B64" | base64 -d > lib/main.dart
      - name: Write pubspec.yaml
        run: |
          
          echo "$B64" | base64 -d > pubspec.yaml
      - name: Write AndroidManifest.xml
        run: |
          
          echo "$B64" | base64 -d > android/app/src/main/AndroidManifest.xml
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: dual-camera-app
          path: build/app/outputs/flutter-apk/app-release.apk
